version: "3.9"

services:
  # ═══════════════════════════════════════════
  # Dittofeed Lite - All-in-one (Dashboard + API + Worker)
  # ═══════════════════════════════════════════
  dittofeed-lite:
    image: dittofeed/dittofeed-lite:${IMAGE_TAG:-v0.23.0}
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-dittofeed_secret}
      - CLICKHOUSE_HOST=http://clickhouse:8123
      - CLICKHOUSE_USER=dittofeed
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-dittofeed_click}
      - TEMPORAL_ADDRESS=temporal:7233
      - SECRET_KEY=${SECRET_KEY:-change-me-to-a-random-64-char-string}
      - PASSWORD=${ADMIN_PASSWORD:-admin123}
      - WORKSPACE_NAME=${WORKSPACE_NAME:-Default}
      - AUTH_MODE=single-tenant
      - NODE_ENV=production
      - DASHBOARD_API_BASE=https://ditto.axeljutoran.com
      - BOOTSTRAP=true
      - PORT=3000
      - HOST=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 1024M
    networks:
      - dittofeed-net

  # ═══════════════════════════════════════════
  # FIA Engagement Engine
  # Sidecar independiente: lee Supabase → Claude → WhatsApp
  # ═══════════════════════════════════════════
  fia-engine:
    build:
      context: ../packages/fia-engagement-engine
      dockerfile: Dockerfile
    image: fia-engagement-engine:latest
    restart: always
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      # Supabase (FIA Copilot DB — read-only)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # Claude API
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      # WhatsApp
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER:-cloud_api}
      - WHATSAPP_CLOUD_API_TOKEN=${WHATSAPP_CLOUD_API_TOKEN:-}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID:-}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN:-fia-engine}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_WHATSAPP_FROM=${TWILIO_WHATSAPP_FROM:-}
      # Engine
      - FIA_APP_BASE_URL=${FIA_APP_BASE_URL:-https://fiacopilot.com}
      - ENGINE_BASE_URL=${ENGINE_BASE_URL:-https://engine.axeljutoran.com}
      - ENGINE_PORT=3001
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN:-admin-secret}
      - LOG_LEVEL=${ENGINE_LOG_LEVEL:-info}
      - NODE_ENV=production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - dittofeed-net

  # ═══════════════════════════════════════════
  # PostgreSQL - Dittofeed's own database
  # ═══════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-dittofeed_secret}
      - POSTGRES_DB=dittofeed
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dittofeed-net

  # ═══════════════════════════════════════════
  # ClickHouse - Analytics database
  # ═══════════════════════════════════════════
  clickhouse:
    image: clickhouse/clickhouse-server:24.12.6.70-alpine
    restart: always
    environment:
      - CLICKHOUSE_USER=dittofeed
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-dittofeed_click}
      - CLICKHOUSE_DB=dittofeed
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user dittofeed --password ${CLICKHOUSE_PASSWORD:-dittofeed_click} -q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2048M
    networks:
      - dittofeed-net

  # ═══════════════════════════════════════════
  # Temporal - Workflow engine
  # ═══════════════════════════════════════════
  temporal:
    image: temporalio/auto-setup:1.22.4
    restart: always
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=${DATABASE_PASSWORD:-dittofeed_secret}
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dittofeed-net

volumes:
  postgres_data:
  clickhouse_data:
  clickhouse_logs:

networks:
  dittofeed-net:
    driver: bridge
